<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
.ticker-container {
  position: fixed;
  right: 0;
  bottom: 0;
  width: 100%;
  background-color: white;
  text-align: center;
}

.ticker {
  display: flex;
  flex-wrap: wrap;
  height: 60px;
  margin: 0 auto;
  width: 110%;
}

.news {
  width: 93%;
  height: 25%;
  float: right;
  color: black;
  padding-top: 1.5px;
}

.title {
  width: 5%;
  text-align: center;
  background: black;
  position: relative;
  color: white;
  padding: 10px;
  border-radius: 0%;
}

.title::after {
  position: absolute;
  content: "";
  right: -40%;
  border-left: 20px solid black;
  border-top: 30px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 30px solid transparent;
  top: 0px;
}

.title h5 {
  font-size: 28px;
  margin: 5%;
  font-weight: 5000;
}
.news marquee {
  font-size: 18px;
}

h4 {
  margin-right: 40px;
  display: inline;
  white-space: nowrap;
  font-family: Arial, Helvetica, sans-serif;
}

a:link {
  text-decoration: none;
  color: black;
}

a:visited {
  text-decoration: none;
}

a:hover {
  text-decoration: none;
}

a:active {
  text-decoration: none;
}
</style>

</head>    
</body>
<div class="ticker-container">
      <div class="ticker">
        <div class="title"><h5>DR</h5></div>
        <div class="news">
          <marquee loop="infinite">
            <p>
              <!--- side hvor for vores script fra https://rss.bloople.net/-->
              <script src="//rss.bloople.net/?url=https%3A%2F%2Fwww.dr.dk%2Fnyheder%2Fservice%2Ffeeds%2Fsenestenyt&showtitle=false&type=js"></script>
            </p>
          </marquee>
        </div>
      </div>
    </div>
  </body>
  </html>
